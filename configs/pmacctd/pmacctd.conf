! pmacctd configuration for Wazuh NetFlow Monitoring PoC
! Adjust pcap_interface to match your VM's active network interface

daemonize: true
pcap_interface: ens33
plugins: print

print_output: json
print_output_file: /var/log/netflow/netflow_raw.json
print_output_file_append: true
print_refresh_time: 60

aggregate: src_host, dst_host, src_port, dst_port, proto, tos
