# pmacctd-sample.conf — pmacct Direct Interface Capture Configuration
# Project: Network Flow Monitoring with Wazuh
# Author:  Dimas Qi Ramadhani
# ⚠️  LAB CONFIGURATION — Review before production use
#
# CATATAN: File ini untuk referensi config pmacctd via file.
# Di lab ini, pmacctd dijalankan via CLI (lihat pmacct-collector.sh).
# Equivalent CLI command:
#   sudo pmacctd -i enp1s0 -c src_host,dst_host,src_port,dst_port,proto \
#     -P print -O json -o /var/log/netflow/netflow-raw.json -r 60 -D

# Interface to capture from (adjust to your interface name)
# Check with: ip a
interface: enp1s0

# Aggregate per unique 5-tuple (src IP, dst IP, src port, dst port, protocol)
aggregate: src_host, dst_host, src_port, dst_port, proto

# Output plugin: print JSON to file
plugins: print

# JSON output format
print_output: json

# Output file path
print_output_file: /var/log/netflow/netflow-raw.json

# Flush interval (seconds) — how often to write aggregated records
print_refresh_time: 60

# Run as daemon
daemonize: true
