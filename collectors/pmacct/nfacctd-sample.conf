# nfacctd-sample.conf — pmacct NetFlow/IPFIX Collector Configuration
# Project: Network Flow Monitoring with Wazuh
# Author:  Dimas Qi Ramadhani
# ⚠️  LAB CONFIGURATION — Review before production use

# Do not daemonize during lab testing (set to true for production)
daemonize: false

# NetFlow/IPFIX collector settings
nfacctd_port: 2055
nfacctd_ip: 0.0.0.0

# Aggregate by these fields (creates one record per unique 5-tuple per interval)
aggregate[nf]: src_host, dst_host, src_port, dst_port, proto, timestamp_start, timestamp_end, tcpflags

# Plugins: print output to file as JSON
plugins: print[nf]

# JSON output file
print_output_file[nf]: /var/log/netflow/pmacct-flows.json

# Print history interval (flush aggregated records every 60 seconds)
print_history[nf]: 60s
print_history_roundoff[nf]: m

# Output format: JSON
print_output[nf]: json

# Plugin buffer size
plugin_buffer_size: 10240

# Include byte and packet counters
aggregate_primitives: bytes, packets
